name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Install dependencies
        run: |
          pnpm install --no-frozen-lockfile --ignore-scripts > install_log.txt 2>&1 || {
            cat install_log.txt
            git config --global user.email "sinsumit157@gmail.com"
            git config --global user.name "sumitsinha09-stack"
            git add install_log.txt
            git commit -m "ci: add install error logs for debugging"
            git push origin main
            exit 1
          }

      - name: Build
        run: BASE_PATH=/Portfolio/ PORT=5173 pnpm build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist/public'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
